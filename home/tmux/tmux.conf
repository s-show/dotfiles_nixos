set  -g  base-index         1
setw -g  pane-base-index    1
set  -g  status-keys        vi
set  -g  mode-keys          vi
set  -g  mouse              on
set  -g  focus-events       off
setw -g  aggressive-resize  off
setw -g  clock-mode-style   24
set  -s  escape-time        0
set  -g  history-limit      20000
set  -g  default-terminal   "xterm-256color"
set  -as terminal-features  ",alacritty:RGB,xterm-rio*:RGB"
set  -g  display-panes-time 3000

# ============================================= #
# Load plugins with Home Manager                #
# --------------------------------------------- #
# tmuxplugin-tmux-nova
# ---------------------
### THEME ###
set -g @nova-nerdfonts true
set -g @nova-nerdfonts-left 
set -g @nova-nerdfonts-right 
set -g @nova-pane "#I #W"
set -g @nova-rows 0

### COLORS ###
b_bg="#504945"
seg_a="#a89984 #282828"
seg_b="$b_bg #ddc7a1"
inactive_bg="#32302f"
inactive_fg="#ebdbb2"
active_bg="#fabd2f"
active_fg="#3c3836"

set -gw window-status-current-style bold
set -g  "@nova-status-style-bg" "$inactive_bg"
set -g  "@nova-status-style-fg" "$inactive_fg"
set -g  "@nova-status-style-active-bg" "$active_bg"
set -g  "@nova-status-style-active-fg" "$active_fg"
set -g  "@nova-pane-active-border-style" "#44475a"
set -g  "@nova-pane-border-style" "#827d51"

### STATUS BAR ###
set -g @nova-segment-prefix ["\
      #{?client_prefix,PREFIX ,\
      #{?#{m:copy-mode,#{pane_mode}},COPY ,\
      #{?#{m:tree-mode,#{pane_mode}},TREE ,\
      #{?#{pane_in_mode},SELECT ,\
      #{?pane_synchronized,SYNC ,TMUX \
      }}}}}}]\
      [#S]"
set -g @nova-segment-prefix-colors "$seg_b"
set -g @nova-segment-session "#{session_name}"
set -g @nova-segment-session-colors "$seg_a"
set -g @nova-segment-whoami "#(whoami)@#h"
set -g @nova-segment-whoami-colors "$seg_a"
set -g @nova-segment-continuum "Continuum status: #{continuum_status}"
set -g @nova-segments-0-left "prefix session"
set -g @nova-segments-0-right "continuum whoami"

### WINDOW BAR ###
set -g @nova-pane "#I   #W"
run-shell /nix/store/4kz6k03cvqrlyagglcv5qlyrsbjkh178-tmuxplugin-tmux-nova-1.2.0/share/tmux-plugins/tmux-nova/nova.tmux

# tmuxplugin-tmux-toggle-scratch
# ---------------------
run-shell /nix/store/47736hb8aqzy80r0ibz1lgxx9b6bq4sb-tmuxplugin-tmux-toggle-scratch-28f9ab4/share/tmux-plugins/tmux-toggle-scratch/tmux-toggle-scratch.tmux

# tmuxplugin-continuum
# ---------------------
set -g @continuum-restore 'on'
set -g @continuum-save-interval '30' # minutes
run-shell /nix/store/82hlfcxjq8ww775f36wv79mz327b24mm-tmuxplugin-continuum-unstable-2022-01-25/share/tmux-plugins/continuum/continuum.tmux

# tmuxplugin-resurrect
# ---------------------
set -g @resurrect-strategy-nvim 'session'
run-shell /nix/store/hpw08h9rqdgw4nlpqnk1rqmqm34msy46-tmuxplugin-resurrect-unstable-2022-05-01/share/tmux-plugins/resurrect/resurrect.tmux

# tmuxplugin-tmux-which-key
# ---------------------
set -g @tmux-which-key-xdg-enable 1
set -g @tmux-which-key-disable-autobuild 1
run-shell /nix/store/n7rmywqyznw4pzpa2r25lzywaw5agx1k-tmuxplugin-tmux-which-key-0-unstable-2024-06-08/share/tmux-plugins/tmux-which-key/plugin.sh.tmux

# tmuxplugin-tmux-fzf
# ---------------------
TMUX_FZF_LAUNCH_KEY="M-f"
run-shell /nix/store/9spd6z60r4wk83a9raz7cikb50ccgmm9-tmuxplugin-tmux-fzf-unstable-2023-10-24/share/tmux-plugins/tmux-fzf/main.tmux

# tmuxplugin-tmux-menus
# ---------------------
set -g @menus_use_cache 'No'
run-shell /nix/store/sb3mndf13p16m7f5rjl8lxwabg2703z3-tmuxplugin-tmux-menus-v2.2.33/share/tmux-plugins/tmux-menus/menus.tmux

# ============================================= #
# status-left の表示長を拡張（日時 + mode-indicator を表示するため）
set -g status-left-length 40
set -g status-right-length 100

# スクロールアップするとコピーモードに入る
bind-key -N "スクロールアップでコピーモード" -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'select-pane -t=; copy-mode -e; send-keys -M'"

# 最後までスクロールダウンするとコピーモードを抜ける
bind-key -n WheelDownPane select-pane -t= \; send-keys -M

# 境界線の種類を変更（single, double, heavy, simple, number から選択）
set -g pane-border-lines heavy

# 非アクティブなペイン（colour235 と colour247 を使用）
set -g window-style 'fg=#bcbcbc,bg=#333333'

# ステータスバーを透明化する
set -g status-style bg=default

# ベルが鳴ったウィンドウのウィンドウ名の左にベルマークを表示
set-option -g monitor-bell on
set-option -gw window-status-bell-style "bold"
set-option -gw window-status-format '#(if [ "#{window_bell_flag}" = "1" ]; then
  echo " 󱅫 #{window_index} #{window_name} "; else echo "#{window_index} #{window_name} ";
fi)'

# クリップボードを有効化
set -g set-clipboard on

# ウィンドウ番号を自動リナンバー（削除時に詰める）
set -g renumber-windows on

# 分割時に現在のパスを引き継ぐ
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

#Alt-w で pane 選択のインデックスを表示
bind-key -N "ペイン番号を表示して移動" -n M-W if-shell -F "#{==:#{window_panes},2}" \
    "select-pane -t :.+" \
    "display-panes" 

# Windows / Sessions control
bind-key -N "左のウィンドウへ" -n M-Left  previous-window
bind-key -N "右のウィンドウへ" -n M-Right next-window
bind-key -N "前のクライアントにスイッチ" -n M-Up    switch-client -p
bind-key -N "次のクライアントにスイッチ" -n M-Down  switch-client -n

# Panes control
bind-key -N "左のペインへ" -n S-Left  select-pane -L
bind-key -N "右のペインへ" -n S-Right select-pane -R
bind-key -N "上のペインへ" -n S-Up    select-pane -U
bind-key -N "下のペインへ" -n S-Down  select-pane -D
bind-key -N "プロンプト用ペインを開く" -n C-S-o run-shell "open_prompt_pane"
bind-key -N "左ペインの幅を75にする"   -n M-r run-shell "tmux_pane_resize"

# tmux-toggle-scratch: @__toggle-scratch-session-name が呼び出し元セッションにセットされるため
# ポップアップ内から参照できない問題を回避する
# セッション名が *@scratch に一致するかでポップアップ内外を判定してオーバーライド
bind-key -T root F12 if-shell -F "#{m:*@scratch,#{session_name}}" \
  "detach-client" \
  "run-shell '/nix/store/47736hb8aqzy80r0ibz1lgxx9b6bq4sb-tmuxplugin-tmux-toggle-scratch-28f9ab4/share/tmux-plugins/tmux-toggle-scratch/scripts/show-scratch-popup.bash'"


# ==========================================
# 拡張キー（CSI-u）のパススルー設定
# ==========================================

# ターミナル（Rio等）からの拡張キー入力を常に受け付ける（自動判定の失敗による取りこぼしを防ぐ）
set -s extended-keys always

# 接続元のターミナル名（$TERM）が何であっても、拡張キー対応端末としてTmuxに強制認識させる
set -as terminal-features '*:extkeys'

# 拡張キーの転送フォーマットを、Neovimなどのモダンなエディタが解釈できる「CSI-u」形式に指定する
set -s extended-keys-format csi-u
